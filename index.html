<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mafia Noir TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent-red: #cc0000;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: 'Trebuchet MS', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            color: var(--accent-red);
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 15px rgba(204, 0, 0, 0.5);
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 10px;
            display: inline-block;
        }

        .role-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-bottom: 4px solid var(--accent-red);
            border-radius: 20px;
            padding: 50px 20px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .role-card.revealed {
            border-color: var(--accent-red);
            box-shadow: 0 0 30px rgba(204, 0, 0, 0.3);
        }

        #role-name {
            font-size: 2rem;
            margin: 15px 0;
            color: var(--text-secondary);
        }

        .players-list {
            width: 100%;
            max-width: 350px;
        }

        .player-item {
            background: #151515;
            margin: 8px 0;
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid transparent;
        }

        .player-item.me {
            border-left-color: var(--accent-red);
            background: #1e1e1e;
        }

        .status-alive {
            color: #4CAF50;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .main-btn {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            margin-top: auto;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(204, 0, 0, 0.4);
        }

        .main-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MAFIA</h1>
        <div class="user-badge" id="username">Подключение...</div>
    </div>

    <div class="role-card" id="card">
        <p style="color: var(--text-secondary); margin: 0;">ВАША СЕКРЕТНАЯ РОЛЬ</p>
        <h2 id="role-name">??????</h2>
        <p id="role-hint" style="font-size: 0.8rem; color: #555;">Нажмите кнопку, чтобы узнать судьбу</p>
    </div>

    <div class="players-list">
        <div class="player-item me">
            <span id="my-name">🕵️‍♂️ Вы</span>
            <span class="status-alive">В игре</span>
        </div>
        </div>

    <button class="main-btn" onclick="revealRole()">УЗНАТЬ РОЛЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation(); // Подтверждение при закрытии

        // Устанавливаем цвета темы Telegram
        document.documentElement.style.setProperty('--bg-color', tg.backgroundColor || '#0a0a0a');

        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').innerText = `@${user.username || 'Аноним'}`;
            document.getElementById('my-name').innerText = `🕵️‍♂️ ${user.first_name}`;
        }

        function revealRole() {
            const roles = ['МАФИЯ', 'МИРНЫЙ', 'КОМИССАР', 'ДОН', 'ВРАЧ'];
            const randomRole = roles[Math.floor(Math.random() * roles.length)];
            
            const roleEl = document.getElementById('role-name');
            const cardEl = document.getElementById('card');
            
            roleEl.innerText = randomRole;
            roleEl.style.color = randomRole === 'МАФИЯ' || randomRole === 'ДОН' ? '#cc0000' : '#4CAF50';
            
            cardEl.classList.add('revealed');
            document.getElementById('role-hint').innerText = "Никому не показывайте экран!";

            // Вибрация телефона (Haptic Feedback)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
    </script>
</body>
</html>
